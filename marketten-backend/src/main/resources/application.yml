# application.yml
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/marketten?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8&serverTimezone=UTC&useUnicode=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: marketten
    password: marketten
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 1000 # 연결 실패 시 1초 타임아웃 설정 (서버 멈춤 방지)
  #TODO redis host 추가

  jpa:
    database: mysql
    hibernate:
      ddl-auto: update # 개발 중 데이터 보존을 위해 update로 설정
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

  # file upload setting
  servlet:
    multipart:
      max-request-size: 30MB
      max-file-size: 10MB

  decorator:
    datasource:
      p6spy:
        enable-logging: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI} # 표준 콜백 URI 사용
            scope:
              - email
              - profile
            authorization-grant-type: authorization_code
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: ${NAVER_REDIRECT_URI} # 표준 콜백 URI 사용
            scope: name,email,profile_image
            client-name: Naver
            authorization-grant-type: authorization_code
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI} # 표준 콜백 URI 사용
            scope: profile_nickname,account_email
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# file upload dir path
marketten:
  upload:
    path: upload

# JWT key (비밀 키)
jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.hibernate.sql: trace
    org.hibernate.type: trace
    org.springframework.security.web: trace

server:
  port: 8080
  servlet:
    session:
      tracking-modes: cookie

fastapi:
  server:
    url: http://module:8000
    api-key: TEMP_FASTAPI_API_KEY

app:
  base-url: https://www.marketten.shop

# 파일 업로드 설정
file:
  upload:
    # 1. 파일이 실제로 저장될 서버의 절대 경로 (폴더 끝에 '/' 포함)
    path: /app/uploads/
    # 2. 브라우저가 이 파일들에 접근할 때 사용할 URL 앞부분
    url-prefix: /images/
