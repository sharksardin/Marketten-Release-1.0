<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OAuth2 JWT Test</title>
</head>
<body>
<h1>OAuth2 로그인 테스트</h1>

<p>
    <a href="/oauth2/authorization/google">Google 로그인</a>
</p>
<p>
    <a href="/oauth2/authorization/kakao">Kakao 로그인</a>
</p>
<p>
    <a href="/oauth2/authorization/naver">Naver 로그인</a>
</p>

<hr>

<h2>JWT 확인</h2>
<p>로그인 후 URL에 붙은 accessToken 확인:</p>
<p id="token">로그인 후 accessToken이 query에 표시됩니다.</p>

<script>
    const params = new URLSearchParams(window.location.search);
    const accessToken = params.get('accessToken');
    if (accessToken) {
        document.getElementById('token').innerText = accessToken;
    }
</script>
</body>
</html>
